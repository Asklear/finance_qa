version: 1
timezone: Asia/Shanghai
report:
  minAccuracy: 0.9
  outputDir: tmp/patrol

templates:
  generic_status_check:
    questions:
      - "请概括当前业务状态。"
      - "看一下现在最重要的业务进展。"
    scoring:
      mustContain: []

targets:
  demo_agent:
    kind: generic_agent
    runner:
      type: command_agent
      command: ${AGENT_PATROL_CMD}
      isolatedSessionPrefix: patrol-demo
      requireSessionIsolation: true
    # Read-only direct-tool baseline metadata, not a business golden reference.
    oracle:
      type: readonly_mcp
      mcpUrl: ${AGENT_PATROL_MCP_URL}
      bearerTokenEnv: AGENT_PATROL_MCP_TOKEN
      # Optional direct-baseline timeout. Defaults to 120000.
      # timeoutMs: 120000
      allowedTools:
        - read_status
    # Optional: if configured, scoring uses this structured golden answer and
    # fails closed when it is missing. The command must print JSON with answer,
    # final_answer, finalAnswer, or MCP-style result.content[].text.
    # goldenReference:
    #   type: command
    #   command: ${AGENT_PATROL_GOLDEN_CMD}
    #   timeoutMs: 120000
    suites:
      smoke:
        caseCount: 1
        templates:
          - generic_status_check
