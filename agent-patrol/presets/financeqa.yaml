version: 1
timezone: Asia/Shanghai
report:
  minAccuracy: 0.9
  outputDir: tmp/patrol-financeqa

writeToolPatterns:
  - "^finance-(sync|upload)$"

templates:
  finance_latest_month_revenue:
    questions:
      - "收入表中最新月份的营收是多少？"
      - "按最新可见月份，看一下当月营收。"
      - "{{latest_month_label}}，项目结算营收是多少？"
    variables:
      latest_month_label:
        - "收入表中最新月份"
        - "最新可见月份"
    scoring:
      mustContainAny:
        - ["项目结算", "营收", "收入"]

  finance_project_receivable_unpaid:
    questions:
      - "{{period}}，所有项目的应收未收是多少？"
      - "项目口径看，{{period}}，还有多少应收未收？"
      - "按项目应收口径，{{period}}未回款合计多少？"
    variables:
      period:
        - "从2025年10月起到上一个完整自然月月底"
        - "2025年10月至上一个完整自然月月底"
        - "从2025年10月起至今"
    scoring:
      mustContain:
        - "应收未收"
      mustContainAny:
        - ["项目口径", "所有项目", "项目应收"]

  finance_project_invoiced_receivable_unpaid:
    questions:
      - "{{period}}，所有项目已开票未回款是多少？"
      - "项目口径看，{{period}}已开票未收款还有多少？"
      - "{{period}}，已开票但还没回款的项目金额是多少？"
    variables:
      period:
        - "从2025年10月起到上一个完整自然月月底"
        - "2025年10月至上一个完整自然月月底"
        - "从2025年10月起至今"
    scoring:
      mustContainAny:
        - ["已开票未回款", "已开票未收款"]
        - ["项目口径", "所有项目", "项目应收"]

  finance_project_payable_unpaid:
    questions:
      - "{{period}}，所有项目的应付未付是多少？"
      - "项目口径看，{{period}}，还有多少应付未付？"
      - "按项目成本口径，{{period}}未付款合计多少？"
    variables:
      period:
        - "从2025年10月起到上一个完整自然月月底"
        - "2025年10月至上一个完整自然月月底"
        - "从2025年10月起至今"
    scoring:
      mustContainAny:
        - ["项目口径", "所有项目", "项目应付", "项目成本"]
        - ["应付未付", "项目应付", "已收票未付款"]

  finance_project_invoiced_payable_unpaid:
    questions:
      - "{{period}}，所有项目已收票未付款是多少？"
      - "项目口径看，{{period}}已收票但未付款还有多少？"
      - "{{period}}，已收票未付款的项目金额是多少？"
    variables:
      period:
        - "从2025年10月起到上一个完整自然月月底"
        - "2025年10月至上一个完整自然月月底"
        - "从2025年10月起至今"
    scoring:
      mustContainAny:
        - ["已收票未付款", "已收票但未付款"]
        - ["项目口径", "所有项目", "项目成本", "项目应付", "项目金额"]

  finance_unpaid_projects:
    questions:
      - "25年至26年未付款的项目及对应金额有哪些？"
      - "列一下2025年至2026年还有未付款的项目和金额。"
      - "项目成本口径看，25年至26年未付款项目分别是多少？"
    scoring:
      mustContainAny:
        - ["项目成本", "项目口径", "项目应付"]
        - ["未付款", "应付未付", "已收票未付款"]

targets:
  finance_qa:
    kind: openclaw_finance_agent
    runner:
      type: openclaw_agent_cli
      command: ${OPENCLAW_AGENT_CMD}
      agent: main
      isolatedSessionPrefix: patrol-finance
      requireSessionIsolation: true
      timeoutMs: 360000
    # MVP: this is read-only tool policy metadata, not a business-answer oracle.
    oracle:
      type: financeqa_readonly
      mcpUrl: ${FINANCEQA_MCP_URL}
      bearerTokenEnv: FINANCEQA_MCP_READ_TOKEN
      allowedTools:
        - finance-query
        - finance-host-data
        - finance-dimensions
    suites:
      smoke:
        caseCount: 3
        templates:
          - finance_latest_month_revenue
          - finance_project_receivable_unpaid
          - finance_project_invoiced_receivable_unpaid
          - finance_project_payable_unpaid
          - finance_project_invoiced_payable_unpaid
          - finance_unpaid_projects
      daily:
        caseCount: 8
        templates:
          - finance_latest_month_revenue
          - finance_project_receivable_unpaid
          - finance_project_invoiced_receivable_unpaid
          - finance_project_payable_unpaid
          - finance_project_invoiced_payable_unpaid
          - finance_unpaid_projects
